{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="header-section mb-4 px-2">
        <h2 class="fw-800 m-0">Games</h2>
        <p class="text-secondary small">Daily puzzles</p>
    </div>

    <div class="row g-3 px-2">
        <div class="col-6">
            <a href="{{ url_for('statline.game') }}" class="app-card-link">
                <div class="app-card gradient-statline">
                    <div class="icon-box">📊</div>
                    <span class="app-name">Statline</span>
                </div>
            </a>
        </div>

        <div class="col-6">
            <a href="{{ url_for('moneyline.game') }}" class="app-card-link">
                <div class="app-card gradient-moneyline">
                    <div class="icon-box">💵</div>
                    <span class="app-name">Moneyline</span>
                </div>
            </a>
        </div>
    </div>
</div>

<div class="footer-links">
    <br>
    <a href="{{ url_for('index') }}" style="color: #bdc3c7; font-weight: normal; text-decoration: none;">&larr; Back to Homepage</a>
</div>

<style>
    body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
    .fw-800 { font-weight: 800; letter-spacing: -0.5px; }

    .app-card {
        height: 140px;
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
    }
    .app-card:active { transform: scale(0.92); }
    .app-card-link { text-decoration: none; }

    .icon-box { font-size: 2rem; margin-bottom: 8px; }
    .app-name { font-weight: 700; font-size: 0.95rem; }

    .gradient-statline {
        background: linear-gradient(135deg, #2d1b69 0%, #11998e 100%);
        box-shadow: 0 0 20px rgba(17,153,142,0.35);
    }
    .gradient-moneyline {
        background: linear-gradient(135deg, #134e5e 0%, #1db954 100%);
        box-shadow: 0 0 20px rgba(29,185,84,0.30);
    }
</style>
{% endblock %}
