{% extends "base.html" %}
{% block title %}Finals Admin Login{% endblock %}
{% block styles %}
<style>
  body { background: #0f172a; color: #e2e8f0; }
  nav { background: #1e293b; box-shadow: 0 1px 0 rgba(255,255,255,0.06); }
  nav a, .nav-logo { color: #e2e8f0 !important; }

  .login-wrap {
    max-width: 340px;
    margin: 4rem auto 0;
    text-align: center;
  }
  .login-wrap h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.25rem; }
  .login-wrap p { color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem; }

  .login-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 1.5rem;
  }
  input[type="password"] {
    width: 100%;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 1rem;
    padding: 0.6rem 0.9rem;
    box-sizing: border-box;
    margin-bottom: 0.75rem;
  }
  input[type="password"]:focus { outline: none; border-color: #3b82f6; }
  button[type="submit"] {
    width: 100%;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.65rem;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }
  button[type="submit"]:hover { background: #1d4ed8; }
  .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 0.6rem; }
</style>
{% endblock %}
{% block content %}
<div class="login-wrap">
  <h2>⚙ Finals Admin</h2>
  <p>Enter the admin password to manage picks and config.</p>
  <div class="login-card">
    <form method="post">
      <input type="password" name="pw" placeholder="Password" autofocus>
      <button type="submit">Sign In</button>
      {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    </form>
  </div>
  <p style="margin-top:1.5rem;"><a href="{{ url_for('finals.tracker') }}" style="color:#475569;font-size:0.8rem;text-decoration:none;">← Back to tracker</a></p>
</div>
{% endblock %}
