<div class="admin-card">
    <h3>Step 1: Randomize</h3>
    <form action="/admin/init-pool" method="POST">
        <button class="btn-danger">Initialize 64 Teams</button>
    </form>
</div>

<div class="admin-card">
    <h3>Step 2: Lock Spreads</h3>
    <p>Do this right before the first game tips off.</p>
    <form action="/admin/lock-spreads" method="POST">
        <button class="btn-primary">Lock Spreads</button>
    </form>
</div>

<div class="admin-card">
    <h3>Step 3: Grade & Steal</h3>
    <p>Do this once games are finished.</p>
    <form action="/admin/process-steals" method="POST">
        <button class="btn-success">Update Results</button>
    </form>
</div>
